# -- Container images
image:
  registry: ""          # e.g. "siclaw" -> siclaw/siclaw-runtime:latest
  pullPolicy: Always
  tag: "latest"

# -- Demo MySQL (testing only, not for production)
mysql:
  enabled: false
  image: mysql:8.0
  database: siclaw
  username: siclaw
  password: ""

# -- Database (MySQL, Portal only — Runtime uses adapter API)
database:
  url: ""               # mysql://user:pass@host:3306/siclaw

# -- Agent Runtime
# NOTE: Runtime is a singleton — exactly one replica per Helm release.
# Phone-home WS registration on the upstream (Portal or an external management server) is keyed by
# runtime identity and a second connection with the same identity evicts the
# first, so multiple replicas of the same release would continuously fight.
# Scale horizontally by deploying multiple releases with distinct identities.
runtime:
  enabled: true
  portalSecret: ""      # Runtime → Portal/Upstream API auth (X-Auth-Token on phone-home WS)
  # Where Runtime gets Agent/Credential info from:
  #   Standalone mode: http://siclaw-portal:3003
  #   Upstream mode:     http://upstream-apiserver:8080
  serverUrl: "http://siclaw-portal:3003"
  # Runtime ↔ AgentBox mTLS CA. Without persistence, every Runtime restart
  # generates a fresh CA and existing AgentBox pods (which hold client certs
  # signed by the previous CA) immediately fail mTLS — sessions hang until
  # those pods are reaped.
  #
  # Pick exactly one:
  #   generateCa: true  — chart genCAs once and stores it in a Secret with
  #                       helm.sh/resource-policy=keep so upgrades reuse it.
  #                       NOTE: relies on `helm lookup` to detect the existing
  #                       Secret. `helm template` / `helm install --dry-run`
  #                       cannot lookup the cluster and will emit a FRESH CA
  #                       every render — never pipe their output to
  #                       `kubectl apply -f -`, you will overwrite the live
  #                       Secret and break mTLS for all running AgentBoxes.
  #                       For GitOps / render-then-apply use caSecret instead.
  #   caSecret: "name"  — bring-your-own kubernetes.io/tls Secret (keys
  #                       tls.crt / tls.key). Useful with cert-manager,
  #                       Vault PKI, or any pipeline that pre-renders manifests.
  tls:
    generateCa: true
    caSecret: ""
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  memory:
    # Disabled by default for integrated production deployments. Enabling
    # this re-exposes memory_search/memory_get and session memory auto-save.
    enabled: false
  # Embedding endpoint for memory's hybrid vector search. Only used when
  # memory.enabled=true. When baseUrl is empty, memory falls back to FTS
  # (keyword) search only — no semantic vector recall. The endpoint must be
  # OpenAI-compatible (POST {baseUrl}/embeddings); e.g. a self-hosted TEI /
  # vLLM / Ollama service. Forwarded to each AgentBox pod via the runtime
  # spawner (SICLAW_EMBEDDING_* env). dimensions MUST match the model's output.
  embedding:
    baseUrl: ""           # e.g. http://tei-embedding.<ns>.svc.cluster.local/v1
    model: ""             # e.g. Qwen/Qwen3-Embedding-4B (empty → BAAI/bge-m3)
    dimensions: 0         # e.g. 2560 (0/empty → 1024). Must match the model.
    apiKey: ""            # optional. Empty ⇒ unauthenticated for a self-hosted
                          # endpoint on a DIFFERENT origin than the LLM provider.
                          # If the embedding baseUrl is the SAME origin as the
                          # default LLM provider, that provider's key is reused.
  # Max sub-agent child sessions a single AgentBox runs concurrently. A wide
  # spawn_subagent fan-out queues past this instead of starting one child agent +
  # one LLM stream per target at once (avoids provider 429s / pod pressure).
  # Forwarded to each AgentBox pod as SICLAW_SUBAGENT_CONCURRENCY. Default 5.
  subagentConcurrency: 5
  env: {}

# -- Portal (standalone web UI, replaces Upstream)
portal:
  enabled: true
  # Keep at 1. Live chat/A2A SSE streaming and the in-process A2A task trackers
  # (src/portal/a2a-gateway.ts) are process-local, and a Runtime phone-homes to a
  # single Portal instance — so >1 replica would scatter streams across pods that
  # don't hold the Runtime connection. Horizontal scale needs a shared pub/sub first.
  replicas: 1
  jwtSecret: ""         # Portal's JWT signing key (Portal is the auth boundary)
  portalSecret: ""      # shared with Runtime; verifies Runtime phone-home X-Auth-Token
  service:
    type: NodePort
    port: 3003
    nodePort: 31003
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# -- OCR backend for Portal image/PDF attachment preprocessing
ocr:
  enabled: true
  replicas: 1
  # Set when OCR is provided by another service. If enabled=false and this is
  # empty, Portal treats OCR as unavailable and keeps chat sends recoverable.
  externalUrl: ""
  timeoutMs: 120000
  image:
    # Empty repository uses image.registry + image.tag as siclaw-ocr:<tag>.
    repository: ""
    tag: ""
    pullPolicy: ""
  service:
    port: 8088
  device: "cpu"
  preload: true
  enableStructure: false
  # Per-Pod admitted in-flight OCR requests. PaddleOCR inference is serialized
  # inside each backend process; requests above this limit receive HTTP 503.
  maxConcurrency: 1
  # Per-attachment OCR text characters that Portal may inject into the prompt.
  maxEvidenceTextChars: 32768
  # Total OCR evidence characters that Portal may inject for one chat turn.
  maxTotalEvidenceTextChars: 65536
  # Hard process-level watchdog for a single OCR request. If PaddleOCR hangs past
  # this window, the backend exits and Kubernetes restarts the container.
  hardTimeoutMs: 150000
  # PDF inputs are capped before PaddleOCR runs so a long paper does not occupy
  # OCR workers and delay screenshot/table requests. Set 0 to disable.
  maxPdfPages: 10
  # Decoded image pixel cap before OCR runs. Set 0 to disable.
  maxImagePixels: 50000000
  textDetectionModelName: "PP-OCRv5_mobile_det"
  textRecognitionModelName: "PP-OCRv5_mobile_rec"
  textDetLimitSideLen: ""
  maxRequestBytes: "10485760"
  cache:
    # Cache PaddleOCR/PaddleX model downloads across container restarts in the
    # same Pod. This does not store user uploads or OCR text.
    enabled: true
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  env: {}
  networkPolicy:
    enabled: false
    # Extra Kubernetes NetworkPolicy from entries for OCR-only/shared-service
    # deployments. Example:
    # ingressFrom:
    #   - namespaceSelector:
    #       matchLabels:
    #         kubernetes.io/metadata.name: management-server
    #     podSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: management-apiserver
    ingressFrom: []

# -- AgentBox (spawned at runtime by K8s spawner)
agentbox:
  debugImage: ""
  # Node selector applied to every spawned AgentBox pod. Constrains pods to
  # nodes carrying all of these labels (e.g. { disktype: ssd, pool: agents }).
  # Empty ⇒ no constraint; the scheduler picks any eligible node.
  nodeSelector: {}
  persistence:
    # PVC persistence has two independent concepts:
    #   1. PVC availability (infrastructure) — is a shared RWX PVC present that
    #      agents can mount? Controlled by `enabled` (chart provisions one) OR
    #      `claimName` (reference one you created out-of-band).
    #   2. Global default policy — should callers that DON'T set a per-agent
    #      persistence value use the PVC? Controlled by `enabled` only.
    # A per-agent opt-in (chat.send persistence:true, e.g. from a product portal)
    # mounts the PVC whenever it is *available*, regardless of the global default.

    # Global default policy. true ⇒ also chart-provision + mount the PVC below.
    enabled: false
    # Reference a PRE-EXISTING RWX PVC by name. Set this (with enabled:false) to
    # make the PVC available for per-agent opt-in while keeping the global default
    # OFF. REQUIRED and has NO default on this path — the name differs per
    # deployment and must match a PVC you already created; empty ⇒ no PVC to
    # mount, all agents fall back to emptyDir.
    # When enabled:true this just overrides the chart-managed PVC name
    # (empty → "<release-fullname>-data").
    claimName: ""
    # REQUIRED when enabled: true (chart-provisioned PVC). Must support ReadWriteMany.
    # Examples: nfs, efs-sc, csi-cephfs, longhorn (with RWX).
    # Leaving this empty while enabled keeps the PVC in Pending state.
    # Ignored when referencing an existing PVC via claimName (enabled:false).
    storageClassName: ""
    size: "10Gi"

# -- Metrics & Observability
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    namespace: ""
    namespaceSelector: {}
    additionalLabels: {}
    # gateway:3001/metrics is the ONLY scrape target (agentbox federation re-exports
    # here). The gateway's checkMetricsAuth fails OPEN when SICLAW_METRICS_TOKEN is
    # unset (the default — rely on NetworkPolicy), so leave this empty in that case.
    # If you DO set SICLAW_METRICS_TOKEN, you MUST point bearerTokenSecret at a Secret
    # holding the same token, otherwise every scrape 401s and all metrics go dark.
    # Example: { name: siclaw-metrics-token, key: token }
    bearerTokenSecret: {}
  # NOTE: the agentbox PodMonitor was removed — agentbox metrics are now federated
  # through the Gateway and exported from gateway:3001 (ServiceMonitor above), the
  # single stable scrape target. See metrics-federation-DESIGN.md.
  grafanaDashboard:
    enabled: true
    namespace: ""
    additionalLabels: {}
  prometheusRule:
    enabled: false
    namespace: ""
    additionalLabels: {}
    costThresholdPerHour: 10
